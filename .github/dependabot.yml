version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Asia/Kolkata'
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    groups:
      production:
        dependency-type: 'production'
        update-types: ['minor', 'patch']
      dev:
        dependency-type: 'development'
        update-types: ['minor', 'patch']
    ignore:
      # Pin Expo SDK explicitly; bump it intentionally per ADR-0010.
      - dependency-name: 'expo'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-native'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Asia/Kolkata'
    commit-message:
      prefix: 'ci(deps)'
      include: 'scope'
