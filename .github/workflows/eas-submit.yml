name: EAS Submit

# Manual dispatch only. Submission is irreversible — humans push the button.

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to submit'
        required: true
        type: choice
        options:
          - android
          - ios
      build-id:
        description: 'EAS build ID (from `eas build:list`)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  submit:
    name: Submit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Submit
        run: eas submit --platform ${{ inputs.platform }} --id ${{ inputs.build-id }} --non-interactive
