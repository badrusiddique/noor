name: EAS Build

# Required secrets:
#   EXPO_TOKEN          — Expo personal access token (for EAS dispatch)
#   SENTRY_AUTH_TOKEN   — Sentry auth token (for source-map upload, optional)
#
# Free-tier note: EAS Build has a monthly priority-build budget.
# This workflow runs only on tags, so PR/CI churn does not consume the budget.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  android:
    name: EAS Build — Android
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build (Android, preview profile)
        run: eas build --platform android --profile preview --non-interactive --no-wait

      - name: Generate SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm --output-file sbom.json --output-format json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: sbom.json

      - name: Upload SBOM to release
        uses: softprops/action-gh-release@v2
        with:
          files: sbom.json
          tag_name: ${{ github.ref_name }}

  ios:
    name: EAS Build — iOS
    if: startsWith(github.ref, 'refs/tags/v1.')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build (iOS, preview profile)
        run: eas build --platform ios --profile preview --non-interactive --no-wait
