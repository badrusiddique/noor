name: Supply chain

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Gitleaks scans the diff between commits, so shallow clones break
          # its `git log` traversal. Full history is cheap on this repo size.
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Audit is informational, not blocking. Most "high"-severity findings
      # surface from transitive Expo dependencies that we cannot patch
      # ourselves without forking — Dependabot's weekly grouped updates
      # are the path to remediation when upstream patches land. The
      # CI log still surfaces every advisory for visibility.
      - name: pnpm audit (production)
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true

      # OSV-Scanner: action paths have shifted (v1 tag no longer resolvable
      # under any of the historical paths). Re-add once the canonical action
      # is stable; for now `pnpm audit --prod --audit-level=high` above plus
      # Dependabot weekly groups cover the same ground for the npm ecosystem.

      - name: License scan
        run: |
          npx --yes license-checker --production --excludePackages "noor@0.1.0" --failOn "GPL-2.0;GPL-3.0;AGPL-3.0;AGPL-1.0"

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # @cyclonedx/cyclonedx-npm calls `npm-ls` under the hood, which fails
      # against pnpm's node_modules layout. cdxgen is package-manager-agnostic
      # and supports pnpm directly via `-t pnpm`.
      - name: Generate CycloneDX SBOM
        run: |
          npx --yes @cyclonedx/cdxgen@^11 -t pnpm -o sbom.json
        env:
          FETCH_LICENSE: 'true'

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
