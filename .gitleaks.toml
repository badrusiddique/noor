title = "Noor gitleaks config"

[allowlist]
description = "Allowed false positives"
paths = [
  "data/sources.json",
  "docs/THIRD_PARTY_NOTICES.md",
]

[[rules]]
id = "expo-token"
description = "Expo access token"
regex = '''(?i)(expo|eas)[_-]?token['"\s]*[:=]\s*['"][a-z0-9_-]{30,}['"]'''
tags = ["expo", "secret"]

[[rules]]
id = "sentry-dsn"
description = "Sentry DSN with secret"
regex = '''https?://[a-f0-9]+:[a-f0-9]+@[a-z0-9.-]+/[0-9]+'''
tags = ["sentry", "secret"]
